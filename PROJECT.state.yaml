# Cortex Project State
#
# Tracks completion status across all work streams and phases.
# Updated by /team-kickoff and /team-code-execute on phase completion.
# Read by /where-are-we to show current status and next steps.
#
# Status values: done | in_progress | next | pending | blocked
#   done        — phase fully shipped (code merged, tests pass)
#   in_progress — kickoff or execution actively running
#   next        — all dependencies met, ready to start
#   pending     — waiting on dependencies, not yet actionable
#   blocked     — explicitly blocked (see notes)

