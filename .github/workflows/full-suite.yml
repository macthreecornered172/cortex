name: Full Test Suite

on:
  workflow_dispatch:

env:
  MIX_ENV: test
  ELIXIR_VERSION: "1.17.3"
  OTP_VERSION: "27.2"

jobs:
  # ── No-infra group ──────────────────────────────────────────

  elixir-check:
    name: Elixir Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Cache deps and build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: elixir-${{ runner.os }}-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            elixir-${{ runner.os }}-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Run checks
        run: make check

  go-check:
    name: Go Sidecar Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.1"
          cache-dependency-path: sidecar/go.sum

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Run sidecar checks
        run: make sidecar-check

  elixir-integration:
    name: Elixir Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Cache deps and build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: elixir-${{ runner.os }}-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            elixir-${{ runner.os }}-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Run integration tests
        run: make test-integration

  # ── Phoenix server group (each test starts its own) ─────────

  e2e-gate:
    name: E2E Gate (Mock)
    runs-on: ubuntu-latest
    env:
      MIX_ENV: dev
    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.1"
          cache-dependency-path: e2e/go.sum

      - name: Cache Elixir deps and build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: elixir-${{ runner.os }}-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            elixir-${{ runner.os }}-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-

      - name: Install Elixir dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile

      - name: Set up database
        run: mix ecto.create && mix ecto.migrate

      - name: Run gate e2e tests
        run: make e2e-gate

  e2e-gate-claude:
    name: E2E Gate (Claude)
    runs-on: ubuntu-latest
    env:
      MIX_ENV: dev
    steps:
      - uses: actions/checkout@v4

      - name: Check for API key
        id: check-key
        run: |
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "has_key=false" >> "$GITHUB_OUTPUT"
            echo "::warning::ANTHROPIC_API_KEY not configured — skipping Claude tests"
          else
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Elixir
        if: steps.check-key.outputs.has_key == 'true'
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Set up Go
        if: steps.check-key.outputs.has_key == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.1"
          cache-dependency-path: e2e/go.sum

      - name: Cache Elixir deps and build
        if: steps.check-key.outputs.has_key == 'true'
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: elixir-${{ runner.os }}-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            elixir-${{ runner.os }}-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-

      - name: Install Elixir dependencies
        if: steps.check-key.outputs.has_key == 'true'
        run: mix deps.get

      - name: Compile
        if: steps.check-key.outputs.has_key == 'true'
        run: mix compile

      - name: Set up database
        if: steps.check-key.outputs.has_key == 'true'
        run: mix ecto.create && mix ecto.migrate

      - name: Run gate Claude e2e tests
        if: steps.check-key.outputs.has_key == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: make e2e-gate-claude

  cli-e2e:
    name: CLI Provider E2E (Claude)
    runs-on: ubuntu-latest
    env:
      MIX_ENV: dev
    steps:
      - uses: actions/checkout@v4

      - name: Check for API key
        id: check-key
        run: |
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "has_key=false" >> "$GITHUB_OUTPUT"
            echo "::warning::ANTHROPIC_API_KEY not configured — skipping Claude tests"
          else
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Elixir
        if: steps.check-key.outputs.has_key == 'true'
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Set up Go
        if: steps.check-key.outputs.has_key == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.1"
          cache-dependency-path: e2e/go.sum

      - name: Cache Elixir deps and build
        if: steps.check-key.outputs.has_key == 'true'
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: elixir-${{ runner.os }}-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            elixir-${{ runner.os }}-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-

      - name: Install Elixir dependencies
        if: steps.check-key.outputs.has_key == 'true'
        run: mix deps.get

      - name: Compile
        if: steps.check-key.outputs.has_key == 'true'
        run: mix compile

      - name: Set up database
        if: steps.check-key.outputs.has_key == 'true'
        run: mix ecto.create && mix ecto.migrate

      - name: Run CLI e2e tests
        if: steps.check-key.outputs.has_key == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: make e2e-cli && make e2e-cli-multi

  # ── Binary builds + local e2e ───────────────────────────────

  e2e-local:
    name: E2E Local Process
    runs-on: ubuntu-latest
    env:
      MIX_ENV: dev
    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.1"
          cache-dependency-path: e2e/go.sum

      - name: Cache Elixir deps and build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: elixir-${{ runner.os }}-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            elixir-${{ runner.os }}-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-

      - name: Install Elixir dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile

      - name: Set up database
        run: mix ecto.create && mix ecto.migrate

      - name: Run local e2e tests
        run: make e2e-local

  elixir-e2e:
    name: Elixir E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.1"
          cache-dependency-path: sidecar/go.sum

      - name: Cache Elixir deps and build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: elixir-${{ runner.os }}-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            elixir-${{ runner.os }}-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-

      - name: Install Elixir dependencies
        run: mix deps.get

      - name: Build sidecar binary
        run: make sidecar-build

      - name: Run Elixir e2e tests
        run: make e2e-elixir

  # ── Docker group ────────────────────────────────────────────

  docker-integration:
    name: Docker Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.1"
          cache-dependency-path: e2e/go.sum

      - name: Run Docker integration tests
        run: make docker-integration

  docker-e2e-mock:
    name: Docker E2E (Mock)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.1"
          cache-dependency-path: e2e/go.sum

      - name: Run Docker DAG e2e tests
        run: make e2e-docker-simple && make e2e-docker-multi

  docker-e2e-claude:
    name: Docker E2E (Claude)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for API key
        id: check-key
        run: |
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "has_key=false" >> "$GITHUB_OUTPUT"
            echo "::warning::ANTHROPIC_API_KEY not configured — skipping Claude tests"
          else
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Go
        if: steps.check-key.outputs.has_key == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.1"
          cache-dependency-path: e2e/go.sum

      - name: Run Docker DAG Claude e2e tests
        if: steps.check-key.outputs.has_key == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: make e2e-docker-simple-claude && make e2e-docker-multi-claude

  # ── K8s group (kind cluster) ────────────────────────────────

  k8s-e2e:
    name: K8s E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.1"
          cache-dependency-path: e2e/go.sum

      - name: Install kind
        run: |
          curl -Lo ./kind "https://kind.sigs.k8s.io/dl/v0.24.0/kind-linux-amd64"
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Run K8s e2e tests
        run: make e2e-k8s-simple && make e2e-k8s-multi

      - name: Teardown kind cluster
        if: always()
        run: make e2e-k8s-teardown
