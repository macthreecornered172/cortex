name: "Cortex Blitz"
workspace_path: /tmp/cortex-blitz

defaults:
  model: sonnet
  max_turns: 100
  permission_mode: bypassPermissions
  timeout_minutes: 45

teams:
  # ============================================================
  # TIER 0 — IDEATION (2 teams run in parallel)
  # Each team designs a DSL that compiles to orchestra.yaml
  # ============================================================

  - name: phoenix-ideation
    lead:
      role: "Language Designer — syntax design, tradeoffs, final spec"
    members:
      - role: "PL Research Analyst"
        focus: "Research functional language patterns (Haskell, ML, Elixir). Document in research-notes.md"
      - role: "Spec Writer"
        focus: "Write the proposal with syntax examples, grammar, and compilation strategy. Own proposal.md"
    tasks:
      - summary: "Design a Haskell/ML-inspired DSL that compiles to orchestra.yaml"
        deliverables:
          - "/tmp/cortex-blitz/phoenix/research-notes.md"
          - "/tmp/cortex-blitz/phoenix/syntax-examples.md"
          - "/tmp/cortex-blitz/phoenix/grammar.md"
          - "/tmp/cortex-blitz/phoenix/proposal.md"
    context: |
      You are Team Phoenix in the Cortex Blitz Hackathon — a DSL design competition.

      THE CHALLENGE:
      Cortex uses verbose YAML configs (orchestra.yaml) to define multi-agent projects.
      Design a better language that compiles DOWN to orchestra.yaml.

      Your DSL must express:
      - Project name and defaults (model, max_turns, timeout, permissions)
      - Teams with leads, members, tasks, dependencies, and context
      - DAG structure via dependency declarations
      - Task definitions with deliverables and verify commands

      TARGET OUTPUT (orchestra.yaml schema):
      ```yaml
      name: "project-name"
      defaults:
        model: sonnet
        max_turns: 200
        timeout_minutes: 120
      teams:
        - name: team-name
          lead: { role: "Role" }
          members: [{ role: "Member Role", focus: "..." }]
          depends_on: [other-team]
          tasks: [{ summary: "...", deliverables: ["file.md"] }]
          context: "Free-form instructions..."
      ```

      YOUR ANGLE: Haskell/ML-inspired functional DSL.
      - Pipeline operators, algebraic types, pattern matching
      - Differentiator: SAFETY and COMPOSITION
      - If `dsl compile` exits 0, the DAG is guaranteed valid

      DELIVERABLES (write ALL to /tmp/cortex-blitz/phoenix/):
      1. research-notes.md — language research findings
      2. syntax-examples.md — before/after comparisons showing DSL vs raw YAML
      3. grammar.md — full grammar specification (EBNF or PEG)
      4. proposal.md — complete language proposal with rationale

      CONSTRAINTS:
      - Target: Elixir + NimbleParsec for the compiler
      - Must handle the full orchestra.yaml schema, not a subset
      - Show at least 3 real-world examples compiled to YAML

  - name: nova-ideation
    lead:
      role: "Language Designer — syntax design, tradeoffs, final spec"
    members:
      - role: "Developer Experience Analyst"
        focus: "Research minimal config languages (Makefiles, Dockerfiles, GitHub Actions). Document in research-notes.md"
      - role: "Spec Writer"
        focus: "Write the proposal with syntax examples, grammar, and compilation strategy. Own proposal.md"
    tasks:
      - summary: "Design a minimal convention-over-configuration DSL that compiles to orchestra.yaml"
        deliverables:
          - "/tmp/cortex-blitz/nova/research-notes.md"
          - "/tmp/cortex-blitz/nova/syntax-examples.md"
          - "/tmp/cortex-blitz/nova/grammar.md"
          - "/tmp/cortex-blitz/nova/proposal.md"
    context: |
      You are Team Nova in the Cortex Blitz Hackathon — a DSL design competition.

      THE CHALLENGE:
      Cortex uses verbose YAML configs (orchestra.yaml) to define multi-agent projects.
      Design a better language that compiles DOWN to orchestra.yaml.

      Your DSL must express:
      - Project name and defaults (model, max_turns, timeout, permissions)
      - Teams with leads, members, tasks, dependencies, and context
      - DAG structure via dependency declarations
      - Task definitions with deliverables and verify commands

      TARGET OUTPUT (orchestra.yaml schema):
      ```yaml
      name: "project-name"
      defaults:
        model: sonnet
        max_turns: 200
        timeout_minutes: 120
      teams:
        - name: team-name
          lead: { role: "Role" }
          members: [{ role: "Member Role", focus: "..." }]
          depends_on: [other-team]
          tasks: [{ summary: "...", deliverables: ["file.md"] }]
          context: "Free-form instructions..."
      ```

      YOUR ANGLE: Minimal scripting — convention over configuration.
      - Readable in 30 seconds, writable in 5 minutes
      - Differentiator: SIMPLICITY — zero ceremony
      - Inspired by Makefiles, Dockerfiles, GitHub Actions YAML

      DELIVERABLES (write ALL to /tmp/cortex-blitz/nova/):
      1. research-notes.md — language research findings
      2. syntax-examples.md — before/after comparisons showing DSL vs raw YAML
      3. grammar.md — full grammar specification (EBNF or PEG)
      4. proposal.md — complete language proposal with rationale

      CONSTRAINTS:
      - Target: Elixir + NimbleParsec for the compiler
      - Must handle the full orchestra.yaml schema, not a subset
      - Show at least 3 real-world examples compiled to YAML

  # ============================================================
  # TIER 1 — REVIEW (evaluates both proposals)
  # ============================================================

  - name: review
    depends_on: [phoenix-ideation, nova-ideation]
    lead:
      role: "Technical Reviewer — evaluates proposals for feasibility, expressiveness, and ergonomics"
    members:
      - role: "Compiler Feasibility Analyst"
        focus: "Assess whether each grammar can be parsed with NimbleParsec in the time budget. Write feasibility.md"
      - role: "Comparison Writer"
        focus: "Side-by-side comparison of both languages on the same examples. Write comparison.md"
    tasks:
      - summary: "Review both DSL proposals and give actionable feedback"
        deliverables:
          - "/tmp/cortex-blitz/review/comparison.md"
          - "/tmp/cortex-blitz/review/feasibility.md"
          - "/tmp/cortex-blitz/review/review.md"
    context: |
      You are the Review Team in the Cortex Blitz Hackathon.

      Two teams have designed competing DSLs that compile to orchestra.yaml:
      - Team Phoenix (functional, Haskell-inspired) — proposals in /tmp/cortex-blitz/phoenix/
      - Team Nova (minimal, convention-based) — proposals in /tmp/cortex-blitz/nova/

      YOUR JOB:
      1. Read ALL deliverables from both teams
      2. Evaluate each proposal on: expressiveness, feasibility, ergonomics, completeness
      3. Give each team a verdict: APPROVED, REVISE (with specific fixes), or PIVOT

      DELIVERABLES (write ALL to /tmp/cortex-blitz/review/):
      1. comparison.md — side-by-side analysis of both languages
      2. feasibility.md — can each grammar actually be parsed? Complexity estimate?
      3. review.md — final verdicts with actionable feedback for each team

      Be specific in feedback. "Fix the grammar" is useless. "The `depends_on` syntax is ambiguous
      because X — change it to Y" is useful.

  # ============================================================
  # TIER 2 — BUILD (each team builds their compiler)
  # ============================================================

  - name: phoenix-build
    depends_on: [review]
    lead:
      role: "Compiler Engineer — builds the lexer, parser, and codegen"
    members:
      - role: "Implementation Developer"
        focus: "Implement the core DSL-to-YAML translation from the spec. Own the main modules."
      - role: "QA Engineer"
        focus: "Write test cases: valid inputs that compile correctly, invalid inputs that produce clear errors."
    tasks:
      - summary: "Build a working compiler: Phoenix DSL → orchestra.yaml"
        deliverables:
          - "/tmp/cortex-blitz/phoenix-compiler/lib/compiler.ex"
          - "/tmp/cortex-blitz/phoenix-compiler/lib/parser.ex"
          - "/tmp/cortex-blitz/phoenix-compiler/lib/codegen.ex"
          - "/tmp/cortex-blitz/phoenix-compiler/README.md"
        verify: "cd /tmp/cortex-blitz/phoenix-compiler && mix compile && mix test"
    context: |
      You are Team Phoenix's Build Squad in the Cortex Blitz Hackathon.

      Your ideation team designed a functional DSL. The review team evaluated it.
      Read the review feedback and your original proposal, then BUILD THE COMPILER.

      INPUT:
      - Your proposal: /tmp/cortex-blitz/phoenix/ (research-notes.md, syntax-examples.md, grammar.md, proposal.md)
      - Review feedback: /tmp/cortex-blitz/review/ (review.md, feasibility.md)

      APPLY any REVISE feedback from the review before building. If the review said
      to fix something, fix it in your implementation.

      BUILD in /tmp/cortex-blitz/phoenix-compiler/:
      1. Create Mix project: `mix new phoenix_compiler`
      2. Core modules — however you want to structure it (parser, transpiler, codegen, etc.)
      3. test/ — at least 5 test cases (3 valid, 2 error cases)
      4. examples/ — at least 2 .phoenix files with expected .yaml output
      5. README.md — usage instructions, language overview

      NOTE: This does NOT have to be a traditional compiler with a formal lexer/parser/AST.
      A transpiler, template engine, or any approach that takes your DSL as input and produces
      valid orchestra.yaml as output is fine. Pick the simplest approach that works.

      It must ACTUALLY WORK: `mix run -e 'PhoenixCompiler.compile_file("example.phoenix")'`
      should produce valid orchestra.yaml on stdout.

      VERIFY: After building, run `mix compile` and `mix test` to confirm everything works.

  - name: nova-build
    depends_on: [review]
    lead:
      role: "Compiler Engineer — builds the lexer, parser, and codegen"
    members:
      - role: "Implementation Developer"
        focus: "Implement the core DSL-to-YAML translation from the spec. Own the main modules."
      - role: "QA Engineer"
        focus: "Write test cases: valid inputs that compile correctly, invalid inputs that produce clear errors."
    tasks:
      - summary: "Build a working compiler: Nova DSL → orchestra.yaml"
        deliverables:
          - "/tmp/cortex-blitz/nova-compiler/lib/compiler.ex"
          - "/tmp/cortex-blitz/nova-compiler/lib/parser.ex"
          - "/tmp/cortex-blitz/nova-compiler/lib/codegen.ex"
          - "/tmp/cortex-blitz/nova-compiler/README.md"
        verify: "cd /tmp/cortex-blitz/nova-compiler && mix compile && mix test"
    context: |
      You are Team Nova's Build Squad in the Cortex Blitz Hackathon.

      Your ideation team designed a minimal scripting DSL. The review team evaluated it.
      Read the review feedback and your original proposal, then BUILD THE COMPILER.

      INPUT:
      - Your proposal: /tmp/cortex-blitz/nova/ (research-notes.md, syntax-examples.md, grammar.md, proposal.md)
      - Review feedback: /tmp/cortex-blitz/review/ (review.md, feasibility.md)

      APPLY any REVISE feedback from the review before building. If the review said
      to fix something, fix it in your implementation.

      BUILD in /tmp/cortex-blitz/nova-compiler/:
      1. Create Mix project: `mix new nova_compiler`
      2. Core modules — however you want to structure it (parser, transpiler, codegen, etc.)
      3. test/ — at least 5 test cases (3 valid, 2 error cases)
      4. examples/ — at least 2 .nova files with expected .yaml output
      5. README.md — usage instructions, language overview

      NOTE: This does NOT have to be a traditional compiler with a formal lexer/parser/AST.
      A transpiler, template engine, or any approach that takes your DSL as input and produces
      valid orchestra.yaml as output is fine. Pick the simplest approach that works.

      It must ACTUALLY WORK: `mix run -e 'NovaCompiler.compile_file("example.nova")'`
      should produce valid orchestra.yaml on stdout.

      VERIFY: After building, run `mix compile` and `mix test` to confirm everything works.

  # ============================================================
  # TIER 3 — JUDGING (scores both compilers)
  # ============================================================

  - name: judges
    depends_on: [phoenix-build, nova-build]
    lead:
      role: "Head Judge — coordinates scoring, writes final results"
    members:
      - role: "Language Design Judge"
        focus: "Score syntax elegance, expressiveness, and readability. Write design-scores.md"
      - role: "Compiler Quality Judge"
        focus: "Test both compilers on examples, evaluate error handling and output quality. Write compiler-scores.md"
    tasks:
      - summary: "Score both DSL compilers and declare a winner"
        deliverables:
          - "/tmp/cortex-blitz/judging/design-scores.md"
          - "/tmp/cortex-blitz/judging/compiler-scores.md"
          - "/tmp/cortex-blitz/judging/results.md"
    context: |
      You are the Judging Panel for the Cortex Blitz Hackathon.

      Two teams built competing DSL compilers that compile to orchestra.yaml:
      - Team Phoenix (functional, Haskell-inspired):
        - Proposal: /tmp/cortex-blitz/phoenix/
        - Compiler: /tmp/cortex-blitz/phoenix-compiler/
      - Team Nova (minimal, convention-based):
        - Proposal: /tmp/cortex-blitz/nova/
        - Compiler: /tmp/cortex-blitz/nova-compiler/

      SCORING (100 points total):
      1. Language Design (35 pts) — syntax elegance, expressiveness, readability, learning curve
      2. Compiler Quality (35 pts) — does it compile? error messages? edge cases? test coverage?
      3. Practical Utility (30 pts) — would YOU actually use this instead of raw YAML?

      YOUR JOB:
      1. Read both proposals and review feedback
      2. Try both compilers: read their examples, run them if possible, check test results
      3. Score each team on all 3 categories with detailed justification
      4. Declare a winner

      DELIVERABLES (write ALL to /tmp/cortex-blitz/judging/):
      1. design-scores.md — Language Design scores with justification
      2. compiler-scores.md — Compiler Quality scores with justification
      3. results.md — Final scores, winner declaration, and summary

      Be fair, specific, and cite examples from the code. No ties allowed — pick a winner.
