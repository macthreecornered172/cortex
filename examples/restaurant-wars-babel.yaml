          R(no-schema):key:value-pairs-one-line. R/T(schema):`[fields]`-then-positional-rows. Multi-record-T:first-field=ID.
          H:`/`=depth1,`//`=depth2,none=root. Node=`title:name[:attr]`.
          G:`source>targets`=1token. `A>B,C`=adjacency-list.
          C:`[entities]domain:range`-then-constraints. `entity:{set}`=membership.
          ## Data Fidelity
          Keys+values=exact-source. No-abbreviation. `_`=space-in-values-only(not-keys).
          ## Disambiguation
          `:`+`{`=set-membership. `:`+value=key:value. `/`-at-token-start=H-depth. `>`-in-G=edge. `>`-in-C=greater-than.
          ```

          ### Encoding rules for your deliverable:

          - Per-team scores → Babel R: `R team:Fuego concept:8 menu_creativity:9 ...`
          - Comparison table → Babel T: `T [category Fuego Umami edge]`
          - Detailed feedback prose → English

          Write your review to critic-preview.md.
        deliverables:
          - "critic-preview.md"
    depends_on:
      - fuego
      - umami

  # --- Tier 2: Both teams revise based on critic feedback ---
  - name: fuego-revised
    lead:
      role: "Head Chef — Team Fuego (Final Round)"
    tasks:
      - summary: "Revise your restaurant concept based on critic feedback"
        details: |
          The critic has reviewed your restaurant. Read their feedback carefully.
          The critic's scores are encoded in Babel — decode them using the spec below.

          Now produce your FINAL restaurant concept:
          1. Address every piece of criticism — explain what you changed and why
          2. Revised 5-course tasting menu (keep what worked, fix what didn't)
          3. Updated drink pairings
          4. Any new additions inspired by the feedback
          5. Your closing argument: why Fuego should win

          ## Babel Protocol

          Decode the critic's Babel scores/table, and encode your revised menu
          in Babel too. Keep creative prose in English.

