          ```

          ### Encoding rules:

          - Comparison table → Babel T: `T [category Fuego Umami edge]`
          - Final scores → Babel R: `R team:Fuego total:... best_dish:...`
          - Narrative comparison, best dish/pairing, winner declaration → English prose

          Be dramatic. This is the finale. Write your verdict to final-judgement.md.
        deliverables:
          - "final-judgement.md"
    depends_on:
      - fuego-revised
      - umami-revised
