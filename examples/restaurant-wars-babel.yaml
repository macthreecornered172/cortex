  # --- Tier 1: Critic previews both restaurants and gives feedback ---
  - name: critic-preview
    lead:
      role: "Restaurant Critic"
    tasks:
      - summary: "Review both restaurant concepts and provide detailed feedback"
        details: |
          You are a Michelin-star restaurant critic doing a preview review of two
          competing restaurant concepts. Read both teams' menus carefully.

          Both teams encoded their structured data using the Babel protocol.
          Decode their Babel blocks to extract menu and metadata, then read their
          English prose for creative content.

          For EACH restaurant, score and critique:
          - Concept & Theme (1-10): originality, coherence, marketability
          - Menu Creativity (1-10): dish originality, technique ambition, flavor profiles
          - Drink Program (1-10): pairing logic, creativity, execution
          - Presentation (1-10): plating philosophy, visual storytelling
          - The X-Factor (1-10): what sets it apart, would you go back?

          Give specific, constructive feedback for each team. Tell them exactly what
          to improve, what to cut, and what to double down on. Be tough but fair.

          ## Babel Protocol

          Decode the teams' Babel blocks using this spec, and encode YOUR scores
          and comparison table in Babel too.

          ```
          # Babel v3
          ## Format
          Line1=HEADER [params]. Lines2+=payload, space-separated fields, newline-separated records. No end marker.
          ## Headers
          R=record T=table H=hierarchy G=graph C=constraint E=elimination
          ## Operators
          `:`key:value(1token) `>`edge(G)/greater-than(C) `=`equals `!=`not-equal `+1=`adjacent `!`exclude-prefix `v`versus(no-space) `max`maximize(before-T-schema) `?`instruction-line
          ## Delimiters
