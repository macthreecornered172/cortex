name: "rw-babel-1"

# Babel Protocol A/B Test
# ---------------------------------
# Same exact deliverables as restaurant-wars.yaml.
# Only difference: agents encode structured data (menus, scores, comparisons)
# using Babel protocol. Creative prose stays in English.
# Compare deliverable token counts and output quality against the control.

defaults:
  model: sonnet
  max_turns: 100
  permission_mode: bypassPermissions
  timeout_minutes: 10

teams:
  # --- Tier 0: Two rival chef teams design their restaurants in parallel ---
  - name: fuego
    lead:
      role: "Head Chef — Team Fuego"
    tasks:
      - summary: "Design a complete restaurant concept and tasting menu"
        details: |
          You are the head chef of Team Fuego. Create a bold, original restaurant concept:

          1. Restaurant name, theme, and vibe (decor, music, target clientele)
          2. A 5-course tasting menu with dish names, descriptions, and key techniques
          3. Signature cocktail or drink pairing for each course
          4. Plating philosophy and presentation style
          5. What makes your restaurant unforgettable

          ## Babel Protocol — READ THIS FIRST

          You MUST use the Babel encoding protocol for all structured data in your
          deliverable. Use English prose only for creative descriptions, philosophy,
          and arguments. Downstream agents will decode your Babel using this same spec.

          ```
          # Babel v3
          ## Format
          Line1=HEADER [params]. Lines2+=payload, space-separated fields, newline-separated records. No end marker.
          ## Headers
          R=record T=table H=hierarchy G=graph C=constraint E=elimination
          ## Operators
          `:`key:value(1token) `>`edge(G)/greater-than(C) `=`equals `!=`not-equal `+1=`adjacent `!`exclude-prefix `v`versus(no-space) `max`maximize(before-T-schema) `?`instruction-line
          ## Delimiters
          `[..]`schema/entity-set(space-sep,`[`attaches-first,`]`attaches-last) `{..}`value-set(comma-sep,no-space,1token) `,`in-token-separator `_`space-in-values-only `-`range
          ## Types
          Number=digits(.digits) String=non-numeric Bool=1/0 Date=YYYY-MM-DD Time=HH:MM TimeRange=HH:MM-HH:MM List=comma-joined Ref=context-ID
          ## Grammar+Encoding
          Line1-token1=header. key:value=1token. op-between-operands-no-space=1token. `{..}`=1token. Each-line=1statement.
          R(no-schema):key:value-pairs-one-line. R/T(schema):`[fields]`-then-positional-rows. Multi-record-T:first-field=ID.
          H:`/`=depth1,`//`=depth2,none=root. Node=`title:name[:attr]`.
          G:`source>targets`=1token. `A>B,C`=adjacency-list.
          C:`[entities]domain:range`-then-constraints. `entity:{set}`=membership.
          ## Data Fidelity
          Keys+values=exact-source. No-abbreviation. `_`=space-in-values-only(not-keys).
          ## Disambiguation
          `:`+`{`=set-membership. `:`+value=key:value. `/`-at-token-start=H-depth. `>`-in-G=edge. `>`-in-C=greater-than.
          ```

          ### Encoding rules for your deliverable:

          - Restaurant metadata → Babel R: `R name:... theme:... vibe:... target_clientele:...`
          - Tasting menu → Babel T: `T [course dish technique pairing]` with one row per course
          - Creative descriptions, plating philosophy, what makes it unforgettable → English prose

          Be creative, specific, and passionate. This is a competition — you need to
          blow the judges away. Write everything to fuego-menu.md.
        deliverables:
          - "fuego-menu.md"
    depends_on: []

