  # --- Tier 3: Final judgement ---
  - name: final-judgement
    lead:
      role: "Head Judge"
    tasks:
      - summary: "Deliver the final verdict on Restaurant Wars"
        details: |
          You are the head judge of Restaurant Wars. You have seen both teams'
          original concepts, the critic's preview, and the revised final menus.
          All structured data is encoded in Babel — decode it using the spec below.

          Deliver your FINAL JUDGEMENT:

          1. Side-by-side comparison across all categories:
             - Concept & Theme
             - Menu Creativity & Technique
             - Drink Program
             - Presentation & Plating
             - Growth from Feedback (how well did they respond to criticism?)
             - The X-Factor

          2. Highlight the single best dish across both restaurants
          3. Highlight the single best drink pairing
          4. Call out the biggest missed opportunity
          5. Declare the WINNER with a clear explanation of why

          ## Babel Protocol

          Decode all upstream Babel blocks using this spec, and encode your
          comparison table and final scores in Babel too.

          ```
          # Babel v3
          ## Format
          Line1=HEADER [params]. Lines2+=payload, space-separated fields, newline-separated records. No end marker.
