# ServiceAccount + Role + RoleBinding for Cortex to manage agent pods.
# Uses the default namespace — cortex.dev/* labels provide isolation.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cortex-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cortex-pod-manager
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cortex-pod-manager-binding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: cortex-sa
    namespace: default
roleRef:
  kind: Role
  name: cortex-pod-manager
  apiGroup: rbac.authorization.k8s.io
