# Secrets for agent pods spawned by Cortex.
# PodSpec references these via secretKeyRef in container env.
apiVersion: v1
kind: Secret
metadata:
  name: cortex-gateway-token
  namespace: default
type: Opaque
stringData:
  token: "e2e-k8s-dag-token"
---
apiVersion: v1
kind: Secret
metadata:
  name: anthropic-api-key
  namespace: default
type: Opaque
stringData:
  key: "fake-key"
