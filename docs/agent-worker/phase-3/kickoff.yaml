name: "agent-worker-phase-3"
description: "Docker + SpawnBackend.Docker/K8s (SQLite retained)"
status: pending

dependencies:
  - docs/agent-worker/phase-2/kickoff.yaml
  - docs/compute-spawning/PROJECT.md
  - docs/compute-spawning/agent-worker-design.md

goals:
  - Dockerfile for Cortex (Elixir release)
  - Dockerfile for sidecar + agent-worker
  - Docker Compose for local dev (Cortex + SQLite volume + sidecar + worker)
  - SpawnBackend.Docker — Cortex auto-spawns containers
  - SpawnBackend.K8s — Cortex creates K8s pods

outcome: |
  Production-deployable Cortex. docker compose up starts everything.
  backend: docker in YAML config means Cortex auto-spawns sidecar + worker
  containers per agent. backend: k8s does the same with K8s pods.

tasks:
  - name: cortex-dockerfile
    summary: "Dockerfile for Cortex (Elixir release)"
    details: |
      Multi-stage build: deps → compile → release.
      Include mix release config. Expose ports 4000 (HTTP) and 4001 (gRPC).

  - name: worker-dockerfile
    summary: "Dockerfile for sidecar + agent-worker"
    details: |
      Single image with both binaries. Entrypoint script starts sidecar,
      waits for health, then starts agent-worker.

  - name: docker-compose
    summary: "Docker Compose for local dev"
    details: |
      Services: cortex (Elixir, SQLite volume), and optionally sidecar + worker
      for testing external configs. Shared network.

  - name: spawn-backend-docker
    summary: "SpawnBackend.Docker — auto-spawn agent containers"
    details: |
      When config says backend: docker, Cortex calls Docker Engine API
      to run sidecar + worker containers. Reuse the worker-dockerfile image.
      Set env vars for gateway URL, agent name, auth token.
      Monitor container health, clean up on run completion.

  - name: spawn-backend-k8s
    summary: "SpawnBackend.K8s — auto-spawn K8s pods"
    details: |
      When config says backend: k8s, Cortex creates a Pod spec with
      two containers (sidecar + worker) sharing localhost.
      Uses k8s Elixir library for API communication.
      Clean up pods on run completion.

verify:
  - "docker compose up -d && mix test"
  - "make e2e"
