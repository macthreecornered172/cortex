teammates:
  - role: "ExternalAgent Engineer"
    doc: external-agent.md
    focus: |
      Build the ExternalAgent GenServer and its supervisor — the Elixir-side
      process that owns the relationship with a sidecar-connected agent.

      Files to create:
      - `lib/cortex/agent/external_agent.ex` — ExternalAgent GenServer
        - `start_link(opts)` — opts include:
          - `:name` — agent name (must match sidecar's registered name in Gateway)
          - `:registry` — Gateway.Registry server ref (default: Gateway.Registry)
          - `:timeout_ms` — default task timeout (default: 1_800_000)
        - On init:
          - Confirm agent with matching name exists in Gateway.Registry
          - Store the agent's ID, transport info from RegisteredAgent
          - Subscribe to Gateway PubSub for agent status events
          - Return {:ok, state} or {:stop, :agent_not_found}
        - `run(server, prompt, opts)` — GenServer.call that:
          - Builds Provider.External config from stored state
          - Delegates to Provider.External.run/3
          - Returns {:ok, TeamResult.t()} | {:error, term()}
        - `stop(server)` — graceful shutdown
          - Unsubscribes from PubSub
          - Optionally updates agent status in Registry
        - `get_state(server)` — returns current state (agent info, status, health)
        - Handle PubSub events:
          - :agent_status_changed — update local state
          - :agent_disconnected — log warning, mark unhealthy
          - :agent_registered — if matching name, update connection info (reconnect)
      - `lib/cortex/agent/external_supervisor.ex` — DynamicSupervisor for ExternalAgents
        - `start_agent(opts)` — starts ExternalAgent under supervisor
        - `stop_agent(name)` — stops by name
        - `list_agents()` — all running external agents
      - `test/cortex/agent/external_agent_test.exs`
      - `test/cortex/agent/external_supervisor_test.exs`

      Key design decisions:
      - GenServer.call for run/3 so the caller blocks naturally
      - Provider.External is the dispatch engine — ExternalAgent just wraps it
        with lifecycle management and sidecar monitoring
      - Uses Gateway PubSub (already exists) for sidecar health events
      - Does NOT deploy sidecar — assumes it's already registered

  - role: "Executor Integration Engineer"
    doc: executor-integration.md
    focus: |
      Wire ExternalAgent into the executor flow so that `provider: external`
      in YAML config automatically manages the sidecar lifecycle via ExternalAgent.

      Files to modify:
      - `lib/cortex/orchestration/runner/executor.ex` — update the provider
        invocation path (around lines 454-480):
        - When provider_mod is Provider.External:
          1. Look up or start an ExternalAgent for this team_name
          2. Call ExternalAgent.run(agent, prompt, opts) instead of the
             generic provider_mod.start/run/stop pattern
          3. The ExternalAgent handles Provider.External internally
        - When provider_mod is NOT Provider.External:
          - Keep existing generic start/run/stop path unchanged
      - `lib/cortex/application.ex` — add ExternalSupervisor to the app
        supervision tree (if not already started by Gateway.Supervisor)

      Files to create:
      - `test/cortex/orchestration/runner/executor_external_test.exs` — tests
        for the executor → ExternalAgent path:
        - Config with provider: external starts ExternalAgent
        - ExternalAgent.run is called with correct prompt and opts
        - Timeout and error handling work through the GenServer layer
        - Provider: cli path is unchanged (regression test)

      Integration test:
      - Start Gateway.Registry, PendingTasks, ExternalSupervisor
      - Register a mock sidecar agent
      - Run a single-team DAG config with provider: external
      - Verify the executor creates an ExternalAgent and dispatches correctly
      - Verify cleanup on completion
