phase: "Remote Backends"

goal: >
  Implement SpawnBackend.Docker and SpawnBackend.K8s so Cortex can spawn agents in Docker
  containers and as Kubernetes Jobs, with output streaming, status tracking, and dashboard
  integration for remote agents.

system_context: |
  ## Project Overview

  Cortex is an Elixir/OTP multi-agent orchestration system. Phase 1 introduced Provider and
  SpawnBackend behaviours. Phase 2 added Provider.HTTP for direct Claude API integration.
  Phase 3 added Provider.External — dispatch work to sidecar agents via Gateway.
  This phase adds remote compute backends — Docker containers and Kubernetes Jobs — so agents
  can run on infrastructure beyond the local machine, using Provider.External for the
  control plane.

  ## Architecture

  The SpawnBackend behaviour (from Phase 1):
  ```elixir
  @callback spawn(config) :: {:ok, handle}
  @callback stream(handle) :: {:ok, Enumerable.t()}
  @callback stop(handle) :: :ok
  @callback status(handle) :: :running | :done | :failed
  ```

  SpawnBackend.Local (from Phase 1) opens an Erlang port to a local process. The remote
  backends do the equivalent but on remote compute:

  - **Docker**: Create and start a container via Docker Engine API, stream logs
  - **K8s**: Create a Job via Kubernetes API, stream pod logs

  Both backends need to:
  1. Package the agent's prompt and config into the container/pod
  2. Start the container/pod
  3. Stream stdout back to Cortex for real-time updates
  4. Report status (running/done/failed)
  5. Clean up on stop or completion

  ## Container Design

  The agent container runs:
  - An LLM provider process (e.g., `claude -p` for CLI mode, or a small script that
    calls the Claude API for HTTP mode)
  - Output goes to stdout in the same NDJSON format Cortex already parses

  For CLI mode: the container has `claude` CLI installed, runs `claude -p` with the prompt
  For HTTP mode: the container runs a small Elixir/Python/Go script that calls the API

  Environment variables passed to the container:
  - ANTHROPIC_API_KEY — for API access
  - CORTEX_PROMPT — the agent's prompt (or mounted as a file)
  - CORTEX_MODEL — model to use
  - CORTEX_MAX_TURNS — turn limit
  - CORTEX_OUTPUT_FORMAT — "stream-json" for NDJSON output

  ## Docker Engine API

  Docker Engine exposes a REST API over a Unix socket (/var/run/docker.sock).
  Key endpoints:
  - POST /containers/create — create a container
  - POST /containers/{id}/start — start it
  - GET /containers/{id}/logs?follow=true&stdout=true — stream logs
  - GET /containers/{id}/json — inspect container (status, exit code)
  - POST /containers/{id}/stop — stop container
  - DELETE /containers/{id} — remove container

  In Elixir, you can call these via Req with a Unix socket adapter, or use
  `System.cmd("docker", ...)` as a simpler alternative.

  ## Kubernetes API

  The `k8s` Elixir library provides a client for the Kubernetes API.
  Key operations:
  - Create a Job resource (spawns a pod)
  - Watch pod status (Pending → Running → Succeeded/Failed)
  - Stream pod logs
  - Delete Job on cleanup

  A Kubernetes Job spec for an agent:
  ```yaml
  apiVersion: batch/v1
  kind: Job
  metadata:
    name: cortex-agent-{run_id}-{team_name}
    labels:
      cortex.run: {run_id}
      cortex.team: {team_name}
  spec:
    backoffLimit: 0
    ttlSecondsAfterFinished: 300
    template:
      spec:
        restartPolicy: Never
        containers:
          - name: agent
            image: cortex-agent:latest
            env:
              - name: ANTHROPIC_API_KEY
                valueFrom:
                  secretKeyRef:
                    name: cortex-secrets
                    key: anthropic-api-key
              - name: CORTEX_PROMPT
                value: "{prompt}"
            resources:
              requests:
                memory: "256Mi"
                cpu: "100m"
              limits:
                memory: "512Mi"
                cpu: "500m"
  ```

  ## Existing Modules (from Phases 1-2)

  - `lib/cortex/provider.ex` — Provider behaviour
  - `lib/cortex/spawn_backend.ex` — SpawnBackend behaviour
  - `lib/cortex/provider/cli.ex` — CLI provider
  - `lib/cortex/provider/http.ex` — HTTP provider
  - `lib/cortex/spawn_backend/local.ex` — Local backend (reference implementation)
  - `lib/cortex/provider/resolver.ex` — resolves provider/backend from config
  - `lib/cortex/orchestration/team_result.ex` — TeamResult struct
  - `lib/cortex/telemetry.ex` — telemetry events
  - `lib/cortex_web/live/run_detail_live.ex` — run detail LiveView

  ## Coding Conventions
  - @moduledoc, @doc, @spec on all public functions
  - defstruct with @enforce_keys for required fields
  - Pattern match in function heads
  - Return {:ok, value} | {:error, reason} from fallible functions
  - Tests mirror lib/ structure, use async: true where safe

dependencies:
  - docs/compute-spawning/PROJECT.md
  - docs/compute-spawning/phase-1-foundation/kickoff.yaml
  - docs/compute-spawning/phase-3-external-provider/kickoff.yaml

plans_dir: docs/compute-spawning/phase-4-remote-backends/plans
